; PlatformIO Project Configuration
; Magic 8 Ball — ESP32-S3-Touch-AMOLED-1.75C (Waveshare)
; CO5300 466×466 QSPI AMOLED + LLM-powered answers

[env:esp32s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; 16 MB flash (QIO, 80 MHz) – matches the Waveshare board
board_build.flash_mode       = qio
board_build.f_flash          = 80000000L
board_upload.flash_size      = 16MB
board_build.arduino.memory_type = qio_opi

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    -DESP32QSPI_FREQUENCY=80000000
    -DCONFIG_I2S_SUPPRESS_DEPRECATE_WARN
    -DLV_FONT_MONTSERRAT_28=1
    -I include

monitor_speed = 115200

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.6
    lewisxhe/SensorLib@^0.3.1
    lewisxhe/XPowersLib@^0.3.3
    lvgl/lvgl@^8.4.0
    bblanchon/ArduinoJson@^7.0.0
    earlephilhower/ESP8266Audio@^2.0.0
